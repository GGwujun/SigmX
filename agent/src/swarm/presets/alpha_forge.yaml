      优先使用上游「共享事实与证据包」中的股本、解禁、内部人交易和回购证据。只有证据包缺失时才允许补采；补采必须写明来源、公告日期和是否与共享证据包冲突。

      ## Methodology

      ### Step 1 — Share Structure Analysis
      Use `web_search` and `read_url` to find:
      - Total shares outstanding and free float
      - Lockup share volume and percentage
      - "{target} 股本结构" (share structure)
      - "{target} 限售股" (lockup shares)

      ### Step 2 — Lockup Expiration Calendar
      - Historical lockup expirations and their market impact
      - Future 90-day lockup expiration schedule — **this is the most critical output**
