      python -c "import sys; sys.path.insert(0,'agent'); from src.data.global_market import get_global_snapshot; print(get_global_snapshot())"
      ```
      这会返回：美股三大指数（道琼/纳指/标普）隔夜涨跌幅、国际大宗商品（原油/黄金/铜）、汇率（美元/人民币）。

      ### 分析维度
      1. **美股隔夜表现**：美股三大指数涨跌 → 传导到 A 股开盘情绪（美股大跌 → A 股低开风险）
      2. **行业联动**：根据 {target} 所属行业，判断相关国际品种的影响：
