services:
  vibe-trading:
    # Pull the prebuilt image from ghcr.io (production). Falls back to local
    # build with `docker compose build` / `docker compose up --build`.
    # Default to Aliyun ACR (China, faster pull from CN servers). ghcr.io is
    # also pushed by CI for non-CN use. Override with `image:` if needed.
    image: crpi-i6pwsm2rbcu2h5uv.cn-shenzhen.personal.cr.aliyuncs.com/ggwujun/sigmx:latest
    build: .
    ports:
      - "127.0.0.1:8899:8899"
    env_file:
      - agent/.env
    environment:
      - VIBE_TRADING_TRUST_DOCKER_LOOPBACK=1
      - MARKET_SYNC_DAEMON_ENABLED=0
      # RSSHub instance (docker service name `rsshub`, internal port 1200).
      # The data layer (news_feed.py) reads this to aggregate A-share news.
      - RSSHUB_URL=http://rsshub:1200
    depends_on:
      - rsshub
    volumes:
      - vibe-runs:/app/agent/runs
      - vibe-sessions:/app/agent/sessions
      # Persist user accounts, credits, reports, notify config (~/.vibe-trading
      # inside the container is /home/vibe/.vibe-trading). Without this, users /
      # balances / saved reports are lost on container rebuild.
      - vibe-data:/home/vibe/.vibe-trading
    restart: unless-stopped

  market-sync:
    image: crpi-i6pwsm2rbcu2h5uv.cn-shenzhen.personal.cr.aliyuncs.com/ggwujun/sigmx:latest
    build: .
    env_file:
      - agent/.env
    environment:
      - RSSHUB_URL=http://rsshub:1200
      - MARKET_SYNC_POSTCLOSE_UNIVERSE=all
      - MARKET_SYNC_POSTCLOSE_LOOKBACK_DAYS=365
    depends_on:
      - rsshub
    volumes:
      - vibe-data:/home/vibe/.vibe-trading
    command: ["vibe-trading-sync", "worker", "--interval", "60"]
    restart: unless-stopped

  # RSSHub — turns financial sites (财联社/东财/雪球/同花顺) into structured RSS
  # feeds consumed by news_feed.py. Official image.
  rsshub:
    image: diygod/rsshub:latest
    restart: unless-stopped
    expose:
      - "1200"

  frontend:
    image: node:20
    working_dir: /app
    ports:
      - "5899:5899"
    volumes:
      - ./frontend:/app
    environment:
      - VITE_API_URL=http://vibe-trading:8899
    command: sh -c "npm install && npm run dev -- --host --port 5899"
    profiles:
      - frontend
    depends_on:
      vibe-trading:
        condition: service_started

volumes:
  vibe-runs:
  vibe-sessions:
  vibe-data:
